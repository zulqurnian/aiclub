<style>
        body {
            background-color: #131314;
            color: #e5e2e3;
        }

        .typewriter-container {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid transparent; /* Cursor */
            animation: typing 6s steps(40, end) infinite, blink-caret .75s step-end infinite;
            width: 0;
        }

        .typewriter-text::before {
            content: "Ask about our Corporate Style Generator...";
            animation: textCycle 18s infinite;
        }

        @keyframes typing {
            0%, 20% { width: 0; border-right-color: transparent; }
            40%, 60% { width: 100%; border-right-color: #9CA3AF; }
            80%, 100% { width: 0; border-right-color: transparent; }
        }

        @keyframes blink-caret {
            from, to { border-right-color: transparent }
            50% { border-right-color: #9CA3AF; }
        }

        @keyframes textCycle {
            0%, 33.33% { content: "Ask about our Corporate Style Generator..."; }
            33.34%, 66.66% { content: "Generate a new agent workflow..."; }
            66.67%, 100% { content: "Search the library..."; }
        }

        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, rgba(19,19,20,0) 70%);
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
        }

        .input-glow:focus-within {
             box-shadow: 0 0 40px rgba(37,99,235,0.15);
             border-color: rgba(37,99,235,0.5);
        }
        
        .chat-input-bar {
            background-color: #1E1F20;
            border: 1px solid #2A2B2C;
        }
    </style>
</head>
